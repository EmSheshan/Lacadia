<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Faculty+Glyphic&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/all.min.css">

    <link rel="stylesheet" href="styles.css">

    <link id="dynamic-favicon" rel="icon"
          href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>'">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lacadia Pokédex</title>


    <link rel="preload" href="assets/Bg_Light.svg" as="image" media="(prefers-color-scheme: light)">
    <link rel="preload" href="assets/Bg_Dark.svg" as="image" media="(prefers-color-scheme: dark)">
</head>
<body>

<button class="toggle-dark-mode" onclick="toggleDarkMode('.toggle-dark-mode')"></button>


<header>
    <div class="banner-main">
        <h1>◆ Lacadia Pokédex ◆</h1>
        <button id="searchToggleBtn" class="search-toggle-btn" title="Search & Filter">
            <i class="fas fa-search"></i>
        </button>
    </div>
</header>

<div class="search-filter-bar">
    <div class="search-wrapper">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="searchInput" class="search-input" placeholder="Search Pokémon…" autocomplete="off" aria-label="Search Pokémon">
        <span id="resultCount" class="result-count-badge"></span>
    </div>
    <div id="typeFilterContainer" class="type-filter-container"></div>
</div>

<main id="pokedex">
</main>
<h3>◆ Hyper Forms ◆</h3>
<main id="hyperdex">
</main>

<script src="index.js" type="module"></script>
<script src="darkMode.js"></script>

<footer class="footer">
    <p>&copy; 2024 Pokémon Project. All rights reserved. This is a fan-made project and is not affiliated with or
        endorsed by Pokémon, Nintendo, Game Freak, or any related entities.</p>
</footer>

<button id="backToTop" class="back-to-top" title="Back to top">
    <i class="fas fa-arrow-up"></i>
</button>

<script>

    // Set initial icon and mode based on the saved state
    document.addEventListener('DOMContentLoaded', () => {
        setDarkModeFromStorage('.toggle-dark-mode');
    });

    // Function to change the favicon dynamically
    function changeFavicon(src) {
        const link = document.createElement('link');
        const oldLink = document.getElementById('dynamic-favicon');
        link.id = 'dynamic-favicon';
        link.rel = 'icon';
        link.href = src;

        // Remove the old favicon if it exists
        if (oldLink) {
            document.head.removeChild(oldLink);
        }

        // Add the new favicon
        document.head.appendChild(link);
    }
</script>
</body>
</html>
